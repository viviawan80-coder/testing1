<!DOCTYPE html>

<html>
<head>
<title>Select Photobooth Design</title>

<style>

body{
font-family: Baskerville, "Palatino Linotype", Palatino, "Century Schoolbook L", "Times New Roman", "serif";
text-align:center;
background:#fafafa;
	font-size-adjust: 0.4;
	color: #4b4377;
}

h1{
margin-top:40px;
}

.booth-option{
display:inline-block;
margin:0px;
padding:20px;
background:white;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

img{
width:300px;
border-radius:8px;
}

button{
margin-top:-100px;
padding:7px 14px;
border:none;
background:#948fbd;
color:white;
	
font-size:14px;
cursor:pointer;
border-radius:5px;
}

</style>

</head>

<body>

<h1>Select Your Photobooth</h1>

<div class="booth-option">

<img src="photobooth artwork 2.png">

<br>

<button onclick="selectBooth('design1')">Select</button>

</div>


<script>

function selectBooth(design){

localStorage.setItem("boothDesign", design);

window.location.href = "photobooth.html";

}

</script>

</body>
</html>
