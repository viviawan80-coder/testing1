<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photobooth</title>

<style>

body{
font-family:Arial;
background:#ffffff;
display:flex;
justify-content:center;
align-items:center;
gap:40px;
margin-top:40px;
}

/* photostrip */

#photobooth{
width:360px;
height:520px;
background:white;
position:relative;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
padding:15px;
margin-bottom: 120px;
}

.grid{
display:grid;
grid-template-rows:1fr 1fr;
gap:12px;
height:100%;
}

canvas{
width:100%;
height:100%;
background:#ddd;
}

/* frame overlay */

#frameOverlay{
position:absolute;
top:0;
left:0;
width:100%;
height:115%;
pointer-events:none;
}

/* camera */

#cameraBox{
text-align:center;
}

video{
width:280px;
border-radius:10px;
transform:scaleX(-1);
}

#countdown{
font-size:42px;
font-weight:bold;
margin-top:10px;
}

button{
margin-top:12px;
padding:10px 22px;
border:none;
background:#948fbd;
color:white;
cursor:pointer;
border-radius:5px;
}

</style>

</head>

<body>

<div id="photobooth">

<div class="grid">
<canvas id="photo1" width="330" height="185"></canvas>
<canvas id="photo2" width="330" height="185"></canvas>
</div>

<img id="frameOverlay" src="photobooth frame x2 small.PNG">

</div>

<div id="cameraBox">

<video id="video" autoplay playsinline></video>

<div id="countdown"></div>
<button onclick="startBooth()">Take Picture</button>

</div>

<script>

const video = document.getElementById("video");

/* START CAMERA */
async function startCamera(){
try{
const stream = await navigator.mediaDevices.getUserMedia({
video:true,
audio:false
});
video.srcObject = stream;
}catch(err){
alert("Camera permission needed.");
}
}

startCamera();

let shot = 1;
let isTakingPhoto = false;

/* START BOOTH */
function startBooth(){
shot = 1;
isTakingPhoto = false;

const button = document.querySelector("button");
button.innerText = "Take Picture";
button.onclick = takePhoto;
}

/* TAKE PHOTO */
function takePhoto(){

if(shot > 2){
finishBooth();
return;
}

if(isTakingPhoto) return;
isTakingPhoto = true;

let count = 3;
const countdown = document.getElementById("countdown");
const button = document.querySelector("button");

const timer = setInterval(()=>{

countdown.innerText = count;
count--;

if(count < 0){

clearInterval(timer);
countdown.innerText="";

const canvas = document.getElementById("photo"+shot);
const ctx = canvas.getContext("2d");

/* mirror capture */
ctx.save();
ctx.scale(-1,1);
ctx.drawImage(video,-canvas.width,0,canvas.width,canvas.height);
ctx.restore();

shot++;
isTakingPhoto = false;

if(shot <= 2){
button.innerText = "Take Picture " + shot;
button.onclick = takePhoto;
}else{
finishBooth();
}

}

},1000);

}

/* FINISH + SAVE + REDIRECT */
function finishBooth(){

const finalCanvas = document.createElement("canvas");
finalCanvas.width = 360;
finalCanvas.height = 520;

const ctx = finalCanvas.getContext("2d");

/* background */
ctx.fillStyle = "white";
ctx.fillRect(0,0,360,520);

const p1 = document.getElementById("photo1");
const p2 = document.getElementById("photo2");

/* draw photos */
ctx.drawImage(p1,15,15,330,200);
ctx.drawImage(p2,15,230,330,200);

/* STORE INDIVIDUAL PHOTOS */
try{
localStorage.setItem("photo1", p1.toDataURL("image/png"));
localStorage.setItem("photo2", p2.toDataURL("image/png"));
}catch(e){
console.log("Storage error:", e);
}

/* FRAME */
const frame = new Image();
frame.crossOrigin = "anonymous";

frame.onload = function(){

ctx.drawImage(frame,0,0,360,520);

/* final image */
const imageData = finalCanvas.toDataURL("image/png");
localStorage.setItem("photostrip", imageData);

/* stop camera */
const stream = video.srcObject;
if(stream){
stream.getTracks().forEach(track => track.stop());
}

/* redirect */
window.location.href = "result.html";

};

frame.onerror = function(){

/* fallback without frame */
const imageData = finalCanvas.toDataURL("image/png");
localStorage.setItem("photostrip", imageData);

window.location.href = "result.html";

};

frame.src = "photobooth frame x2 small.PNG";

}

</script>

</body>
</html>
